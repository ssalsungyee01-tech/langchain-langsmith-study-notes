<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LLM 앱 전체 지도</title>
  <desc id="desc">사용자 요청이 메시지, 모델, 도구, 검색, 메모리, 구조화 출력, LangSmith 관찰로 이어지는 흐름</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .title { font: 700 34px Arial, sans-serif; fill: #1f2933; }
      .small { font: 400 18px Arial, sans-serif; fill: #425466; }
      .label { font: 700 22px Arial, sans-serif; fill: #1f2933; }
      .note { font: 400 16px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #273444; stroke-width: 2; rx: 18; }
      .accent1 { fill: #d8f3dc; stroke: #2d6a4f; }
      .accent2 { fill: #dbeafe; stroke: #2563eb; }
      .accent3 { fill: #fff3bf; stroke: #b08900; }
      .accent4 { fill: #fce7f3; stroke: #be185d; }
      .arrow { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text x="60" y="70" class="title">LLM 앱은 '모델 하나'가 아니라 흐름을 설계하는 일</text>
  <text x="60" y="105" class="small">핵심은 사용자 요청을 정리하고, 필요한 맥락과 도구를 붙이고, 결과를 관찰하며 개선하는 것이다.</text>

  <rect x="60" y="170" width="170" height="110" class="box accent1"/>
  <text x="145" y="215" text-anchor="middle" class="label">사용자 요청</text>
  <text x="145" y="247" text-anchor="middle" class="note">메일, 문서, 일정, 질문</text>

  <rect x="280" y="170" width="190" height="110" class="box accent2"/>
  <text x="375" y="210" text-anchor="middle" class="label">메시지/프롬프트</text>
  <text x="375" y="242" text-anchor="middle" class="note">역할, 규칙, 출력 형식</text>

  <rect x="520" y="170" width="170" height="110" class="box accent3"/>
  <text x="605" y="210" text-anchor="middle" class="label">모델</text>
  <text x="605" y="242" text-anchor="middle" class="note">언어로 판단/생성</text>

  <rect x="760" y="90" width="180" height="90" class="box"/>
  <text x="850" y="128" text-anchor="middle" class="label">도구</text>
  <text x="850" y="155" text-anchor="middle" class="note">함수/API 실행</text>

  <rect x="760" y="220" width="180" height="90" class="box"/>
  <text x="850" y="258" text-anchor="middle" class="label">검색/RAG</text>
  <text x="850" y="285" text-anchor="middle" class="note">문서 근거 가져오기</text>

  <rect x="760" y="350" width="180" height="90" class="box"/>
  <text x="850" y="388" text-anchor="middle" class="label">메모리/상태</text>
  <text x="850" y="415" text-anchor="middle" class="note">대화와 작업 맥락</text>

  <rect x="1010" y="170" width="190" height="110" class="box accent4"/>
  <text x="1105" y="210" text-anchor="middle" class="label">구조화 출력</text>
  <text x="1105" y="242" text-anchor="middle" class="note">JSON, 승인 필요, 근거</text>

  <rect x="385" y="530" width="520" height="95" class="box"/>
  <text x="645" y="570" text-anchor="middle" class="label">LangSmith</text>
  <text x="645" y="600" text-anchor="middle" class="note">trace로 관찰하고 dataset/evaluator로 평가한다</text>

  <path d="M230 225 H280" class="arrow"/>
  <path d="M470 225 H520" class="arrow"/>
  <path d="M690 225 C725 225 725 135 760 135" class="arrow"/>
  <path d="M690 225 H760" class="arrow"/>
  <path d="M690 225 C725 225 725 395 760 395" class="arrow"/>
  <path d="M940 135 C985 135 985 205 1010 205" class="arrow"/>
  <path d="M940 265 C985 265 985 240 1010 240" class="arrow"/>
  <path d="M940 395 C985 395 985 260 1010 260" class="arrow"/>
  <path d="M605 280 V530" class="arrow"/>
  <path d="M1105 280 C1105 470 905 520 840 530" class="arrow"/>
</svg>
