<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">RAG 오픈북 비유</title>
  <desc id="desc">질문, 문서 조각, 검색, 모델 답변이 오픈북 시험처럼 연결되는 그림</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #172033; }
      .sub { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 22px Arial, sans-serif; fill: #111827; }
      .text { font: 400 17px Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 16; }
      .doc { fill: #fff8db; stroke: #b08900; stroke-width: 2; rx: 12; }
      .green { fill: #dcfce7; stroke: #15803d; }
      .blue { fill: #dbeafe; stroke: #2563eb; }
      .pink { fill: #fce7f3; stroke: #be185d; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text x="60" y="70" class="title">RAG는 모델에게 '관련 페이지'를 찾아 건네는 오픈북 방식</text>
  <text x="60" y="105" class="sub">모델이 모든 문서를 외우는 것이 아니라, 질문에 맞는 조각을 검색해 근거로 사용한다.</text>

  <rect x="70" y="190" width="220" height="120" class="box green"/>
  <text x="180" y="235" text-anchor="middle" class="label">질문</text>
  <text x="180" y="270" text-anchor="middle" class="text">"경비 처리는</text>
  <text x="180" y="295" text-anchor="middle" class="text">어떻게 해?"</text>

  <rect x="390" y="135" width="170" height="90" class="doc"/>
  <text x="475" y="175" text-anchor="middle" class="label">Chunk 1</text>
  <text x="475" y="203" text-anchor="middle" class="text">휴가 규정</text>
  <rect x="420" y="250" width="170" height="90" class="doc"/>
  <text x="505" y="290" text-anchor="middle" class="label">Chunk 2</text>
  <text x="505" y="318" text-anchor="middle" class="text">경비 규정</text>
  <rect x="390" y="365" width="170" height="90" class="doc"/>
  <text x="475" y="405" text-anchor="middle" class="label">Chunk 3</text>
  <text x="475" y="433" text-anchor="middle" class="text">회의 규정</text>

  <rect x="675" y="235" width="210" height="130" class="box blue"/>
  <text x="780" y="285" text-anchor="middle" class="label">검색기</text>
  <text x="780" y="320" text-anchor="middle" class="text">질문과 의미가</text>
  <text x="780" y="345" text-anchor="middle" class="text">가까운 조각 선택</text>

  <rect x="1000" y="190" width="220" height="160" class="box pink"/>
  <text x="1110" y="235" text-anchor="middle" class="label">모델 답변</text>
  <text x="1110" y="270" text-anchor="middle" class="text">검색된 근거를 보고</text>
  <text x="1110" y="295" text-anchor="middle" class="text">요약/설명한다</text>
  <text x="1110" y="325" text-anchor="middle" class="text">출처도 함께 표시</text>

  <rect x="420" y="555" width="440" height="78" class="box"/>
  <text x="640" y="590" text-anchor="middle" class="label">중요한 태도</text>
  <text x="640" y="618" text-anchor="middle" class="text">검색된 문서는 '명령'이 아니라 '자료'로 취급한다.</text>

  <path d="M290 250 C330 250 350 295 420 295" class="arrow"/>
  <path d="M590 295 H675" class="arrow"/>
  <path d="M885 300 C930 300 945 270 1000 270" class="arrow"/>
  <path d="M505 340 C505 505 585 535 640 555" class="arrow"/>
</svg>
